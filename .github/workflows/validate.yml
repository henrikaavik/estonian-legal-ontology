name: Validate Ontology

on:
  push:
    branches: [main]
    paths:
      - 'krr_outputs/**'
      - 'scripts/validate_all.py'
  pull_request:
    branches: [main]
    paths:
      - 'krr_outputs/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run validation
        run: python3 scripts/validate_all.py
